name: Build Android APK & Playable Artifact

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK with Gradle
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK for Clarity
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/Penalty-Game-v1.0.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Penalty-Game-Android-APK
          path: dist/Penalty-Game-v1.0.apk
          if-no-files-found: error

  build-web:
    name: Package Web Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Upload Web Game Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Penalty-Game-Web-Playable
          path: www/
